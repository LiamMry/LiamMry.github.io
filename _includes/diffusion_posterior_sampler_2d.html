
<div style="padding:1rem 0">

<canvas id="dc" width="620" height="420" style="width:100%;border-radius:var(--border-radius-lg);display:block;cursor:crosshair"></canvas>

<div style="margin-top:6px;height:3px;background:var(--color-background-secondary);border-radius:2px;overflow:hidden">
  <div id="prog" style="height:100%;width:0%;background:#3b82f6;border-radius:2px;transition:width 0.12s linear"></div>
</div>

<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;align-items:center">
  <button id="btnPlay" aria-label="pause or play"><i class="ti ti-player-pause" aria-hidden="true"></i> Pause</button>
  <button id="btnReset" aria-label="reset particles"><i class="ti ti-refresh" aria-hidden="true"></i> Reset</button>
  <button id="btnMode">Prior sampling</button>
  <button id="btnArr">Score field: on</button>
  <div style="display:flex;align-items:center;gap:6px">
    <label for="spdSl" style="font-size:13px;color:var(--color-text-secondary)">Speed</label>
    <input id="spdSl" type="range" min="1" max="10" value="3" step="1" style="width:80px">
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <label for="nPartSl" style="font-size:13px;color:var(--color-text-secondary)">Particles: <b id="nPartLbl">200</b></label>
    <input id="nPartSl" type="range" min="100" max="500" value="200" step="10" style="width:80px">
  </div>
  <div id="yCtrl" style="display:none;align-items:center;gap:6px">
    <label for="yObsSl" style="font-size:13px;color:var(--color-text-secondary)">y<sub>obs</sub> = <b id="yLbl">1.5</b></label>
    <input id="yObsSl" type="range" min="-3.5" max="3.5" step="0.1" value="1.5" style="width:90px">
  </div>
</div>

<div style="display:flex;gap:20px;margin-top:8px;flex-wrap:wrap">
  <span style="font-size:13px;color:var(--color-text-secondary)">σ(t) = <b id="sSig" style="color:var(--color-text-primary)">—</b></span>
  <span style="font-size:13px;color:var(--color-text-secondary)">annealing = <b id="sProg" style="color:var(--color-text-primary)">—</b></span>
  <span style="font-size:13px;color:var(--color-text-secondary)">mode: <b id="sMode" style="color:var(--color-text-primary)">prior</b></span>
  <span style="font-size:13px;color:var(--color-text-secondary)">∇ log p<sub>σ</sub>(x) = <b id="sScoreType" style="color:var(--color-text-primary)">analytical (MoG)</b></span>
</div>

</div>

<script>
const cv = document.getElementById('dc');
const ctx = cv.getContext('2d');
const CW = cv.width, CH = cv.height;
const DOM = 4.5;
const MEANS = [[2.2,0],[-2.2,0],[0,2.2],[0,-2.2]];
const SD = 0.65;
const SM = 3.5, Sm = 0.04;
const NS = 65, SPR = 14;

const sigs = Array.from({length:NS},(_,i)=>SM*Math.pow(Sm/SM,i/(NS-1)));

const LW=160, LH=108;
const ofc = document.createElement('canvas');
ofc.width=LW; ofc.height=LH;
const octx = ofc.getContext('2d');
const ofcP = document.createElement('canvas');
ofcP.width=LW; ofcP.height=LH;
const octxP = ofcP.getContext('2d');

let parts=[], si=0, ss=0, run=true, post=false, sarr=true, spd=3, yO=1.5, nPart=200;
let dcSig=-1, dcSigPost=-1;

function scoreP(x,y,sig){
  const s2=SD*SD+sig*sig;
  let W=0,sx=0,sy=0;
  for(const[mx,my]of MEANS){
    const dx=x-mx,dy=y-my;
    const w=Math.exp(-(dx*dx+dy*dy)/(2*s2));
    W+=w;sx+=w*(mx-x)/s2;sy+=w*(my-y)/s2;
  }
  return W<1e-300?[0,0]:[sx/W,sy/W];
}

function scorePost(x,y,sig){
  const[sx,sy]=scoreP(x,y,sig);
  const SY=0.3,r=x-yO;
  return[sx-r/(SY*SY),sy];
}

function dens(x,y,sig){
  const s2=SD*SD+sig*sig;
  let d=0;
  for(const[mx,my]of MEANS){const dx=x-mx,dy=y-my;d+=Math.exp(-(dx*dx+dy*dy)/(2*s2));}
  return d/(MEANS.length*2*Math.PI*s2);
}

function densPost(x,y,sig){
  const SY=0.3;
  return dens(x,y,sig)*Math.exp(-(x-yO)*(x-yO)/(2*SY*SY));
}

function rn(){const u=1-Math.random(),v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(6.283*v);}
function tc(x,y){return[(x/DOM+1)*CW/2,(-y/DOM+1)*CH/2];}
function fc(cx,cy){return[(cx/CW*2-1)*DOM,-(cy/CH*2-1)*DOM];}
function fcL(lx,ly){return[(lx/LW*2-1)*DOM,-(ly/LH*2-1)*DOM];}

function initP(){
  si=0;ss=0;dcSig=-1;dcSigPost=-1;
  parts=Array.from({length:nPart},()=>({x:rn()*SM,y:rn()*SM,tr:[]}));
}

function step(){
  const sig=sigs[si];
  const alp=0.015*sig*sig;
  const nsq=Math.sqrt(2*alp);
  for(const p of parts){
    p.tr.push([p.x,p.y]);
    if(p.tr.length>5)p.tr.shift();
    const[sx,sy]=post?scorePost(p.x,p.y,sig):scoreP(p.x,p.y,sig);
    p.x+=alp*sx+nsq*rn();
    p.y+=alp*sy+nsq*rn();
    p.x=Math.max(-DOM*1.1,Math.min(DOM*1.1,p.x));
    p.y=Math.max(-DOM*1.1,Math.min(DOM*1.1,p.y));
  }
  ss++;
  if(ss>=SPR){ss=0;if(si<sigs.length-1)si++;else setTimeout(initP,700);}
}

function buildDens(sig){
  const id=octx.createImageData(LW,LH);
  const dat=id.data;
  let mx=0;
  for(let ly=0;ly<LH;ly+=3)for(let lx=0;lx<LW;lx+=3){
    const[x,y]=fcL(lx,ly);const d=dens(x,y,sig);if(d>mx)mx=d;
  }
  if(mx<1e-20)mx=1;
  for(let ly=0;ly<LH;ly++)for(let lx=0;lx<LW;lx++){
    const[x,y]=fcL(lx,ly);
    const t=Math.pow(Math.min(1,dens(x,y,sig)/mx),0.5);
    let r,g,b;
    if(t<0.3){const s=t/0.3;r=Math.round(6+s*10);g=Math.round(9+s*28);b=Math.round(16+s*65);}
    else if(t<0.65){const s=(t-0.3)/0.35;r=Math.round(16+s*8);g=Math.round(37+s*75);b=Math.round(81+s*70);}
    else{const s=(t-0.65)/0.35;r=Math.round(24+s*105);g=Math.round(112+s*108);b=Math.round(151+s*55);}
    const idx=(ly*LW+lx)*4;
    dat[idx]=r;dat[idx+1]=g;dat[idx+2]=b;dat[idx+3]=255;
  }
  octx.putImageData(id,0,0);
  dcSig=sig;
}

function buildDensPost(sig){
  const id=octxP.createImageData(LW,LH);
  const dat=id.data;
  let mx=0;
  for(let ly=0;ly<LH;ly+=3)for(let lx=0;lx<LW;lx+=3){
    const[x,y]=fcL(lx,ly);const d=densPost(x,y,sig);if(d>mx)mx=d;
  }
  if(mx<1e-20)mx=1;
  for(let ly=0;ly<LH;ly++)for(let lx=0;lx<LW;lx++){
    const[x,y]=fcL(lx,ly);
    const t=Math.pow(Math.min(1,densPost(x,y,sig)/mx),0.5);
    const r=Math.round(180+t*55);
    const g=Math.round(20+t*30);
    const b=Math.round(20+t*10);
    const a=Math.round(t*210);
    const idx=(ly*LW+lx)*4;
    dat[idx]=r;dat[idx+1]=g;dat[idx+2]=b;dat[idx+3]=a;
  }
  octxP.putImageData(id,0,0);
  dcSigPost=sig;
}

function drawAxes(){
  ctx.save();
  ctx.strokeStyle='rgba(100,116,139,0.2)';ctx.lineWidth=0.5;
  const[ax0,ay0]=tc(-DOM,0);const[ax1,ay1]=tc(DOM,0);
  ctx.beginPath();ctx.moveTo(ax0,ay0);ctx.lineTo(ax1,ay1);ctx.stroke();
  const[ax2,ay2]=tc(0,-DOM);const[ax3,ay3]=tc(0,DOM);
  ctx.beginPath();ctx.moveTo(ax2,ay2);ctx.lineTo(ax3,ay3);ctx.stroke();
  ctx.fillStyle='rgba(100,116,139,0.45)';ctx.font='9px monospace';
  for(const v of[-4,-2,2,4]){
    const[cx]=tc(v,0);if(cx>=4&&cx<=CW-4)ctx.fillText(v+'',cx-5,CH-5);
    const[,cy]=tc(0,v);if(cy>=4&&cy<=CH-4)ctx.fillText(v+'',3,cy+3);
  }
  ctx.restore();
}

function drawArrows(sig){
  const G=26;
  ctx.lineWidth=0.7;
  for(let py=G/2;py<CH;py+=G)for(let px=G/2;px<CW;px+=G){
    const[x,y]=fc(px,py);
    const[sx,sy]=post?scorePost(x,y,sig):scoreP(x,y,sig);
    const mag=Math.sqrt(sx*sx+sy*sy);
    if(mag<0.05)continue;
    const AL=Math.min(G*0.4,(mag/(0.7+mag))*G*0.82);
    const nx=sx/mag,ny=-sy/mag;
    const tm=Math.min(1,mag/2);
    const r=Math.round(70+tm*80),g=Math.round(140+tm*60),b=Math.round(240-tm*80);
    ctx.strokeStyle=`rgba(${r},${g},${b},0.5)`;
    ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px+nx*AL,py+ny*AL);ctx.stroke();
    const ax=px+nx*AL,ay=py+ny*AL;
    ctx.fillStyle=`rgba(${r},${g},${b},0.5)`;
    ctx.beginPath();ctx.moveTo(ax,ay);
    ctx.lineTo(ax-nx*4-(-ny)*2,ay-ny*4-nx*2);
    ctx.lineTo(ax-nx*4+(-ny)*2,ay-ny*4+nx*2);
    ctx.closePath();ctx.fill();
  }
}

function drawMeas(){
  const[cx]=tc(yO,0);
  ctx.save();
  ctx.setLineDash([8,5]);
  ctx.strokeStyle='rgba(245,158,11,0.7)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,CH);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='rgba(245,158,11,0.9)';
  ctx.font='11px monospace';
  ctx.fillText('y_obs='+yO.toFixed(1)+' (x₁ projection)',cx+5,15);
  ctx.restore();
}

function drawParts(){
  const T=si/(NS-1);
  for(const p of parts){
    if(p.tr.length>1){
      const[tx0,ty0]=tc(p.tr[0][0],p.tr[0][1]);
      ctx.beginPath();ctx.moveTo(tx0,ty0);
      for(let i=1;i<p.tr.length;i++){const[tx,ty]=tc(p.tr[i][0],p.tr[i][1]);ctx.lineTo(tx,ty);}
      ctx.strokeStyle='rgba(96,165,250,0.1)';ctx.lineWidth=0.7;ctx.stroke();
    }
    const[cx,cy]=tc(p.x,p.y);
    if(cx<-4||cx>CW+4||cy<-4||cy>CH+4)continue;
    const r=1.6+(1-T)*2.0;
    const alpha=0.55+T*0.4;
    ctx.beginPath();ctx.arc(cx,cy,r,0,6.283);
    ctx.fillStyle=`rgba(200,225,255,${alpha})`;
    ctx.fill();
  }
}

function drawLabels(sig){
  ctx.save();
  ctx.fillStyle='rgba(148,163,184,0.7)';
  ctx.font='10px monospace';
  ctx.fillText('p(x) = ¼ Σₖ 𝒩(x; μₖ, σ²data I)',8,CH-8);
  ctx.fillStyle='rgba(96,165,250,0.8)';
  ctx.fillText('σ(t) = '+sig.toFixed(3),CW-80,CH-8);
  ctx.restore();
}

function render(){
  const sig=sigs[Math.min(si,NS-1)];
  if(Math.abs(sig-dcSig)/Math.max(dcSig,0.001)>0.06)buildDens(sig);
  if(post&&Math.abs(sig-dcSigPost)/Math.max(dcSigPost,0.001)>0.06)buildDensPost(sig);
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality='high';
  ctx.drawImage(ofc,0,0,CW,CH);
  if(post)ctx.drawImage(ofcP,0,0,CW,CH);
  drawAxes();
  if(sarr)drawArrows(sig);
  if(post)drawMeas();
  drawParts();
  drawLabels(sig);
  document.getElementById('prog').style.width=(si/(NS-1)*100).toFixed(1)+'%';
  document.getElementById('sSig').textContent=sig.toFixed(4);
  document.getElementById('sProg').textContent=(si/(NS-1)*100).toFixed(0)+'%';
}

function loop(){
  if(run)for(let i=0;i<spd;i++)step();
  render();
  requestAnimationFrame(loop);
}

document.getElementById('btnPlay').addEventListener('click',function(){
  run=!run;
  this.innerHTML=run?'<i class="ti ti-player-pause" aria-hidden="true"></i> Pause':'<i class="ti ti-player-play" aria-hidden="true"></i> Play';
});
document.getElementById('btnReset').addEventListener('click',initP);
document.getElementById('btnMode').addEventListener('click',function(){
  post=!post;
  this.textContent=post?'Posterior sampling':'Prior sampling';
  document.getElementById('yCtrl').style.display=post?'flex':'none';
  document.getElementById('sMode').textContent=post?'posterior p(x|y)':'prior p(x)';
  document.getElementById('sScoreType').textContent=post?'analytical + DPS correction':'analytical (MoG)';
  initP();
});
document.getElementById('btnArr').addEventListener('click',function(){
  sarr=!sarr;
  this.textContent=sarr?'Score field: on':'Score field: off';
});
document.getElementById('spdSl').addEventListener('input',e=>spd=parseInt(e.target.value));
document.getElementById('nPartSl').addEventListener('input',function(){
  document.getElementById('nPartLbl').textContent=this.value;
});
document.getElementById('nPartSl').addEventListener('change',function(){
  nPart=parseInt(this.value);
  initP();
});
document.getElementById('yObsSl').addEventListener('input',function(){
  yO=parseFloat(this.value);
  document.getElementById('yLbl').textContent=yO.toFixed(1);
  initP();dcSig=-1;
});

initP();loop();
</script>
